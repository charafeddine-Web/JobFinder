<div class="relative w-full max-w-5xl mx-auto font-['Poppins',sans-serif] px-0 sm:px-2">
  <!-- Background Glow Effect -->
  <div class="absolute -inset-1 bg-gradient-to-r from-orange-500 via-amber-500 to-slate-900 rounded-2xl sm:rounded-[2rem] blur opacity-20 group-hover:opacity-30 transition duration-1000 group-hover:duration-200 pointer-events-none"></div>

  <form [formGroup]="searchForm" (ngSubmit)="onSearch()"
    class="job-search-form relative bg-white/90 backdrop-blur-2xl rounded-2xl sm:rounded-[2rem] shadow-xl sm:shadow-2xl border border-white/50 flex flex-col md:flex-row items-stretch md:items-center gap-2 md:gap-0 md:min-h-[5rem] overflow-hidden">

    <!-- Search Query Input Group -->
    <div class="flex-1 relative group min-h-[3.25rem] sm:min-h-[4rem] md:min-h-0 flex flex-col justify-center py-2 md:py-0 px-3 sm:px-4">
      <div class="absolute inset-y-0 left-4 sm:left-6 flex items-center pointer-events-none">
        <div class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl sm:rounded-2xl bg-orange-50 flex items-center justify-center text-orange-500 group-focus-within:bg-orange-600 group-focus-within:text-white transition-all duration-300">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
      </div>
      <input
        type="text"
        formControlName="query"
        class="w-full h-full min-h-[2.75rem] sm:min-h-[3rem] md:min-h-0 pl-14 sm:pl-20 pr-4 sm:pr-6 bg-transparent text-slate-900 placeholder-slate-400 font-semibold text-base sm:text-lg focus:outline-none"
        placeholder="Search roles, skills..."
      >
      <!-- Floating Label / Hint -->
    </div>

    <!-- Vertical Divider -->
    <div class="hidden md:block w-px bg-slate-100 self-stretch shadow-sm flex-shrink-0"></div>

    <!-- Location Input Group -->
    <div class="flex-1 relative group min-h-[3.25rem] sm:min-h-[4rem] md:min-h-0 flex flex-col justify-center py-2 md:py-0 px-3 sm:px-4">
      <div class="absolute inset-y-0 left-4 sm:left-6 flex items-center pointer-events-none">
        <div class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl sm:rounded-2xl bg-amber-50 flex items-center justify-center text-amber-500 group-focus-within:bg-amber-600 group-focus-within:text-white transition-all duration-300">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
          </svg>
        </div>
      </div>
      <input
        type="text"
        formControlName="location"
        class="w-full h-full min-h-[2.75rem] sm:min-h-[3rem] md:min-h-0 pl-14 sm:pl-20 pr-4 sm:pr-6 bg-transparent text-slate-900 placeholder-slate-400 font-semibold text-base sm:text-lg focus:outline-none"
        placeholder="City or remote"
      >
    </div>

    <!-- Find Jobs button: centered -->
    <div class="flex flex-1 md:flex-none items-center justify-center py-2 md:py-0 px-3 sm:px-4 md:pr-4">
      <button
        type="submit"
        class="w-full sm:w-auto h-12 min-h-[3rem] px-6 sm:px-8 md:px-10 py-3 rounded-xl sm:rounded-2xl font-bold text-sm sm:text-base flex items-center justify-center gap-2 bg-slate-900 text-white hover:bg-orange-600 hover:scale-[1.02] active:scale-95 transition-all duration-300 shadow-xl shadow-slate-200 touch-manipulation"
      >
        <span>Find Jobs</span>
        <svg class="w-5 h-5 animate-bounce-horizontal" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" />
        </svg>
      </button>
    </div>
  </form>

  <!-- Quick Feedback / Trending Tags -->
  <div class="mt-4 sm:mt-6 flex flex-wrap items-center justify-center gap-2 sm:gap-4 animate-fade-in px-2">
    <span class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-wider">Trending:</span>
    <!-- <button (click)="quickSearch('Remote')" class="px-4 py-1.5 rounded-full bg-white border border-slate-100 text-xs font-bold text-slate-600 hover:border-orange-400 hover:text-orange-600 hover:bg-orange-50 transition-all">#Remote</button>
    <button (click)="quickSearch('Angular')" class="px-4 py-1.5 rounded-full bg-white border border-slate-100 text-xs font-bold text-slate-600 hover:border-orange-400 hover:text-orange-600 hover:bg-orange-50 transition-all">#Angular</button>
    <button (click)="quickSearch('Design')" class="px-4 py-1.5 rounded-full bg-white border border-slate-100 text-xs font-bold text-slate-600 hover:border-orange-400 hover:text-orange-600 hover:bg-orange-50 transition-all">#Design</button> -->
    <button (click)="quickSearch('Berlin')" class="px-4 py-1.5 rounded-full bg-white border border-slate-100 text-xs font-bold text-slate-600 hover:border-orange-400 hover:text-orange-600 hover:bg-orange-50 transition-all">#Berlin</button>
  </div>
</div>
